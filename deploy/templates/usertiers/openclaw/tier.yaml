apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: openclaw-usertier
objects:
  - kind: UserTier
    apiVersion: toolchain.dev.openshift.com/v1alpha1
    metadata:
      name: openclaw
      namespace: ${NAMESPACE}
    spec:
      deactivationTimeoutDays: ${{DEACTIVATION_TIMEOUT_DAYS}}
parameters:
  - name: NAMESPACE
  - name: DEACTIVATION_TIMEOUT_DAYS
    value: "60"
