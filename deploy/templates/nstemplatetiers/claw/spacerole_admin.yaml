apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: claw-spacerole-admin
objects:

# RoleBinding to built-in view ClusterRole (read access to most resources, excludes secrets)
- apiVersion: rbac.authorization.k8s.io/v1
  kind: RoleBinding
  metadata:
    name: ${USERNAME}-view
    namespace: ${NAMESPACE}
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: view
  subjects:
  - kind: User
    name: ${USERNAME}

# Custom Role for claw-specific permissions not covered by view
- apiVersion: rbac.authorization.k8s.io/v1
  kind: Role
  metadata:
    name: claw-user
    namespace: ${NAMESPACE}
  rules:
  - apiGroups:
    - "claw.sandbox.redhat.com"
    resources:
    - claws
    verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
  - apiGroups:
    - ""
    resources:
    - pods/exec
    verbs:
    - get
    - create
  - apiGroups:
    - ""
    resources:
    - secrets
    verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
- apiVersion: rbac.authorization.k8s.io/v1
  kind: RoleBinding
  metadata:
    name: ${USERNAME}-claw-user
    namespace: ${NAMESPACE}
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: claw-user
  subjects:
  - kind: User
    name: ${USERNAME}

parameters:
- name: NAMESPACE
  required: true
- name: USERNAME
  required: true
