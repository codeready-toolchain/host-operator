apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: base1ns-cluster-resources
objects:
- apiVersion: quota.openshift.io/v1
  kind: ClusterResourceQuota
  metadata:
    name: for-${SPACE_NAME}-deployments
  spec:
    quota:
      hard:
        count/deployments.apps: "30"
        count/deploymentconfigs.apps: "30"
        count/pods: "50"
        count/virtualmachines.kubevirt.io: "2"
    selector:
      annotations: null
      labels:
        matchLabels:
          toolchain.dev.openshift.com/space: ${SPACE_NAME}
- apiVersion: quota.openshift.io/v1
  kind: ClusterResourceQuota
  metadata:
    name: for-${SPACE_NAME}-replicas
  spec:
    quota:
      hard:
        count/replicasets.apps: "30"
        count/replicationcontrollers: "30"
    selector:
      annotations: null
      labels:
        matchLabels:
          toolchain.dev.openshift.com/space: ${SPACE_NAME}
- apiVersion: quota.openshift.io/v1
  kind: ClusterResourceQuota
  metadata:
    name: for-${SPACE_NAME}-routes
  spec:
    quota:
      hard:
        count/ingresses.extensions: "30"
        count/routes.route.openshift.io: "30"
    selector:
      annotations: null
      labels:
        matchLabels:
          toolchain.dev.openshift.com/space: ${SPACE_NAME}
- apiVersion: quota.openshift.io/v1
  kind: ClusterResourceQuota
  metadata:
    name: for-${SPACE_NAME}-jobs
  spec:
    quota:
      hard:
        count/jobs.batch: "30"
        count/daemonsets.apps: "30"
        count/cronjobs.batch: "30"
        count/statefulsets.apps: "30"
    selector:
      annotations: null
      labels:
        matchLabels:
          toolchain.dev.openshift.com/space: ${SPACE_NAME}
- apiVersion: quota.openshift.io/v1
  kind: ClusterResourceQuota
  metadata:
    name: for-${SPACE_NAME}-services
  spec:
    quota:
      hard:
        count/services: "30"
        services.loadbalancers: '0'
    selector:
      annotations: null
      labels:
        matchLabels:
          toolchain.dev.openshift.com/space: ${SPACE_NAME}
- apiVersion: quota.openshift.io/v1
  kind: ClusterResourceQuota
  metadata:
    name: for-${SPACE_NAME}-bc
  spec:
    quota:
      hard:
        count/buildconfigs.build.openshift.io: "30"
    selector:
      annotations: null
      labels:
        matchLabels:
          toolchain.dev.openshift.com/space: ${SPACE_NAME}
- apiVersion: quota.openshift.io/v1
  kind: ClusterResourceQuota
  metadata:
    name: for-${SPACE_NAME}-secrets
  spec:
    quota:
      hard:
        count/secrets: "100"
    selector:
      annotations: null
      labels:
        matchLabels:
          toolchain.dev.openshift.com/space: ${SPACE_NAME}
- apiVersion: quota.openshift.io/v1
  kind: ClusterResourceQuota
  metadata:
    name: for-${SPACE_NAME}-cm
  spec:
    quota:
      hard:
        count/configmaps: "100"
    selector:
      annotations: null
      labels:
        matchLabels:
          toolchain.dev.openshift.com/space: ${SPACE_NAME}
- apiVersion: rbac.authorization.k8s.io/v1
  kind: ClusterRoleBinding
  metadata:
    name: osl-access-${SPACE_NAME}
    annotations:
      toolchain.dev.openshift.com/feature: openshift-lightspeed
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: lightspeed-operator-query-access
  subjects:
  - kind: User
    apiGroup: rbac.authorization.k8s.io
    name: ${SPACE_NAME}
- apiVersion: toolchain.dev.openshift.com/v1alpha1
  kind: Idler
  metadata:
    name: ${SPACE_NAME}-dev
  spec:
    timeoutSeconds: ${{IDLER_TIMEOUT_SECONDS}}
- apiVersion: admissionregistration.k8s.io/v1
  kind: ValidatingAdmissionPolicy
  metadata:
    name: "for-${SPACE_NAME}-vms"
  spec:
    failurePolicy: Fail
    matchConstraints:
      resourceRules:
      - apiGroups: ["kubevirt.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["virtualmachines"]
    validations:
    - expression: '!has(object.spec.template.spec.domain.memory) || !has(object.spec.template.spec.domain.memory.guest)
        || quantity(object.spec.template.spec.domain.memory.guest).compareTo(quantity("8Gi"))
        <= 0'
      message: VM guest memory must not exceed 8Gi
    - expression: '!has(object.spec.template.spec.domain.resources) || !has(object.spec.template.spec.domain.resources.limits)
        || !has(object.spec.template.spec.domain.resources.limits.memory) || quantity(object.spec.template.spec.domain.resources.limits.memory).compareTo(quantity("8Gi"))
        <= 0'
      message: VM memory limit must not exceed 8Gi
    - expression: '!has(object.spec.template.spec.domain.resources) || !has(object.spec.template.spec.domain.resources.requests)
        || !has(object.spec.template.spec.domain.resources.requests.memory) || quantity(object.spec.template.spec.domain.resources.requests.memory).compareTo(quantity("8Gi"))
        <= 0'
      message: VM memory request must not exceed 8Gi
    - expression: '!has(object.spec.template.spec.domain.resources) || !has(object.spec.template.spec.domain.resources.limits)
        || !has(object.spec.template.spec.domain.resources.limits.cpu) || quantity(object.spec.template.spec.domain.resources.limits.cpu).compareTo(quantity("2"))
        <= 0'
      message: VM CPU limit must not exceed 2
    - expression: '!has(object.spec.template.spec.domain.resources) || !has(object.spec.template.spec.domain.resources.requests)
        || !has(object.spec.template.spec.domain.resources.requests.cpu) || quantity(object.spec.template.spec.domain.resources.requests.cpu).compareTo(quantity("2"))
        <= 0'
      message: VM CPU request must not exceed 2
- apiVersion: admissionregistration.k8s.io/v1
  kind: ValidatingAdmissionPolicyBinding
  metadata:
    name: "for-${SPACE_NAME}-vms"
  spec:
    policyName: "for-${SPACE_NAME}-vms"
    validationActions: ["Deny"]
    matchResources:
      namespaceSelector:
        matchLabels:
            toolchain.dev.openshift.com/space: ${SPACE_NAME}
parameters:
- name: SPACE_NAME
  required: true
- name: IDLER_TIMEOUT_SECONDS
  # 12 hours
  value: "43200"
